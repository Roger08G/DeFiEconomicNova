[profile.default]
src          = "contracts"
out          = "out"
libs         = ["lib"]
solc_version = "0.8.20"
optimizer    = true
optimizer_runs = 200

[profile.ci]
optimizer      = true
optimizer_runs = 200
verbosity      = 3

[fmt]
line_length           = 120
tab_width             = 4
bracket_spacing       = true
int_types             = "long"
multiline_func_header = "all"
quote_style           = "double"
number_underscore     = "thousands"
wrap_comments         = true
ignore                = []

[rpc_endpoints]
mainnet  = "${RPC_MAINNET}"
sepolia  = "${RPC_SEPOLIA}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
